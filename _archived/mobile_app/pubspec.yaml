name: successapp
description: On-device wellbeing companion powered by Gemma 4.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # MediaPipe GenAI plugin for on-device Gemma inference (Android first).
  # If the official plugin name changes, swap here. Alternative: flutter_gemma.
  flutter_gemma: ^0.9.0
  flutter_local_notifications: ^17.2.3
  sqflite: ^2.3.3
  path_provider: ^2.1.4
  shared_preferences: ^2.3.2
  graphview: ^1.2.0
  intl: ^0.19.0
  image_picker: ^1.1.2
  url_launcher: ^6.3.0
  timezone: ^0.9.4
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/
    - assets/prompts/
